<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂覺製所 · 行事曆小幫手</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #C13A1E; --red-dark: #9A2E16;
            --bg0: #F7F1E8; --bg1: #FFFFFF; --txt1: #3D2B1F; --txt2: #7A5C48;
            --border: #DDD0C0; --shadow: 0 8px 40px rgba(61,43,31,.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #D8CFC4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #app {
            width: 100%;
            max-width: 520px;
            background: var(--bg0);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        /* Logo */
        .logo-bar {
            background: var(--bg1);
            padding: 14px 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid var(--red);
        }
        .logo-bar svg { width: 48px; height: 48px; }
        .logo-text .name {
            font-family: 'Noto Serif TC', serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--red);
            letter-spacing: 3px;
        }
        .logo-text .sub {
            font-size: 10.5px;
            color: #B09A88;
            letter-spacing: 1.5px;
            margin-top: 2px;
        }

        /* 登入畫面 */
        #login-screen {
            padding: 48px 32px;
            min-height: 420px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .google-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        .google-btn:hover {
            border-color: var(--red);
            color: var(--red);
            transform: translateY(-1px);
        }

        /* 使用者列 */
        #user-bar {
            display: none;
            background: #F2EAE0;
            padding: 10px 22px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            gap: 10px;
        }
        #user-bar.show { display: flex; }

        /* 主內容 */
        #main-content { display: none; }
        #main-content.show { display: block; flex: 1; flex-direction: column; }

        .header { background: #F2EAE0; padding: 14px 22px 12px; border-bottom: 1px solid var(--border); }
        .tabs { display: flex; background: var(--bg1); border-bottom: 2px solid var(--border); }
        .tab {
            flex: 1; padding: 12px 0; font-size: 12.5px; font-weight: 700;
            text-align: center; cursor: pointer; color: var(--txt2);
            border: none; background: transparent;
        }
        .tab.active { color: var(--red); border-bottom: 2.5px solid var(--red); background: rgba(193,58,30,.08); }

        .panel { display: none; flex: 1; flex-direction: column; padding: 18px; min-height: 480px; }
        .panel.active { display: flex; }

        /* 行事曆 */
        .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .cal-title { font-size: 16px; font-weight: 700; color: var(--txt1); font-family: 'Noto Serif TC', serif; }
        .cal-nav {
            background: var(--bg1); border: 1px solid var(--border); border-radius: 8px;
            width: 32px; height: 32px; cursor: pointer; font-size: 17px;
            display: flex; align-items: center; justify-content: center;
        }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 14px; }
        .cd {
            text-align: center; padding: 5px 2px; font-size: 12.5px; border-radius: 8px;
            cursor: pointer; transition: background .15s; min-height: 32px;
        }
        .cd.today { background: var(--red); color: #fff; font-weight: 800; }

        /* 其他樣式（精簡版） */
        .btn { border: none; border-radius: 10px; padding: 10px 12px; font-weight: 700; cursor: pointer; transition: all .15s; }
        .btn.primary { background: var(--red); color: #fff; }
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #3D2B1F; color: #fff; padding: 11px 22px; border-radius: 14px;
            font-weight: 600; opacity: 0; transition: all .3s; z-index: 9999;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div id="app">
    <!-- LOGO -->
    <div class="logo-bar">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="#C13A1E"/>
            <text x="12" y="32" fill="#fff" font-size="28" font-family="serif">樂</text>
        </svg>
        <div class="logo-text">
            <div class="name">樂覺製所</div>
            <div class="sub">Be true, be you.</div>
        </div>
        <div style="margin-left:auto; text-align:right">
            <div class="app-name" style="font-size:13px;font-weight:700;color:#7A5C48">行事曆小幫手</div>
        </div>
    </div>

    <!-- 登入畫面 -->
    <div id="login-screen">
        <div style="font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;color:#3D2B1F">
            歡迎使用<br>樂覺製所 行事曆小幫手
        </div>
        <div style="font-size:13.5px;color:#7A5C48;line-height:1.8;max-width:300px">
            請先登入 Google 帳號，即可連接個人行事曆並與他人共同排程
        </div>
        <button onclick="startLogin()" class="google-btn">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            使用 Google 帳號登入
        </button>
    </div>

    <!-- 使用者列 -->
    <div id="user-bar">
        <div style="width:28px;height:28px;border-radius:50%;background:#F2EAE0;border:1.5px solid #C13A1E;display:flex;align-items:center;justify-content:center;font-weight:700;color:#C13A1E" id="avatar">👤</div>
        <div style="flex:1">
            <div id="user-name" style="font-weight:700;color:#3D2B1F"></div>
            <div id="user-email" style="font-size:11px;color:#B09A88"></div>
        </div>
        <button onclick="logout()" style="background:none;border:1px solid #DDD0C0;border-radius:8px;padding:4px 12px;font-size:12px;cursor:pointer">登出</button>
    </div>

    <!-- 主內容 -->
    <div id="main-content" style="display:none">
        <!-- 標題與分頁 -->
        <div style="padding:14px 22px;background:#F2EAE0;border-bottom:1px solid #DDD0C0">
            <div id="header-date" style="font-weight:700;color:#3D2B1F"></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab(0)">📅 行事曆</button>
            <button class="tab" onclick="switchTab(1)">👥 多人排程</button>
            <button class="tab" onclick="switchTab(2)">📝 記事</button>
        </div>

        <!-- 面板 -->
        <div class="panel active" id="panel-0">行事曆面板（完整功能）</div>
        <div class="panel" id="panel-1">多人排程面板</div>
        <div class="panel" id="panel-2">記事面板</div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
// ==================== 配置 ====================
let CLIENT_ID = localStorage.getItem('gcal_client_id') || '';
const SCOPES = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email';

let accessToken = null;
let currentUser = null;

// ==================== Google 登入 ====================
function startLogin() {
    if (!CLIENT_ID) {
        alert('請先設定 Google Client ID（點擊下方「設定 Client ID」按鈕）');
        return;
    }
    const client = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (resp) => {
            if (resp.error) return alert('登入失敗');
            accessToken = resp.access_token;
            loadUserInfo();
        }
    });
    client.requestAccessToken();
}

async function loadUserInfo() {
    const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
        headers: { Authorization: 'Bearer ' + accessToken }
    });
    currentUser = await res.json();

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('user-bar').classList.add('show');
    document.getElementById('main-content').style.display = 'flex';

    document.getElementById('user-name').textContent = currentUser.name || '使用者';
    document.getElementById('user-email').textContent = currentUser.email || '';
}

// ==================== 登出 ====================
function logout() {
    if (accessToken) google.accounts.oauth2.revoke(accessToken);
    location.reload();
}

// ==================== 切換分頁 ====================
function switchTab(n) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
    document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===n));
}

// ==================== 設定 Client ID ====================
if (!CLIENT_ID) {
    const modal = document.createElement('div');
    modal.style = 'position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:99999';
    modal.innerHTML = `
        <div style="background:#fff;padding:24px;border-radius:16px;max-width:400px;width:90%">
            <h3>設定 Google Client ID</h3>
            <p style="font-size:13px;color:#666;margin:12px 0">請輸入你在 Google Cloud Console 建立的 OAuth 2.0 Client ID</p>
            <input id="client-id-input" placeholder="184054840538-xxxx.apps.googleusercontent.com" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px">
            <button onclick="saveClientId()" style="margin-top:16px;width:100%;padding:12px;background:#C13A1E;color:white;border:none;border-radius:8px">儲存並繼續</button>
        </div>`;
    document.body.appendChild(modal);
}

function saveClientId() {
    const input = document.getElementById('client-id-input').value.trim();
    if (input) {
        localStorage.setItem('gcal_client_id', input);
        location.reload();
    }
}
</script>
</body>
</html>
