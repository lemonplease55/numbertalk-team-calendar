<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樂覺製所 · 行事曆小幫手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#D8CFC4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
:root{
  --red:#C13A1E;--red-dark:#9A2E16;--red-light:#D4563C;
  --red-faint:rgba(193,58,30,.08);--red-faint2:rgba(193,58,30,.15);
  --bg0:#F7F1E8;--bg1:#FFFFFF;--bg2:#F2EAE0;--bg3:#EDE3D6;--bg4:#E5D8C8;
  --txt1:#3D2B1F;--txt2:#7A5C48;--txt3:#B09A88;--border:#DDD0C0;
  --shadow:0 8px 40px rgba(61,43,31,.12);
}
#app{width:480px;max-width:100%;background:var(--bg0);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;border:1px solid var(--border)}

/* LOGO BAR */
.logo-bar{background:var(--bg1);padding:14px 22px;display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--red)}
.logo-bar img{width:48px;height:48px;object-fit:contain}
.logo-text .name{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:var(--red);letter-spacing:3px}
.logo-text .sub{font-size:10.5px;color:var(--txt3);letter-spacing:1.5px;margin-top:2px}
.logo-divider{width:1px;height:36px;background:var(--border);margin:0 6px}
.logo-right{margin-left:auto;text-align:right}
.logo-right .app-name{font-size:13px;font-weight:700;color:var(--txt2)}
.logo-right .app-sub{font-size:10px;color:var(--txt3);margin-top:2px}

/* LOGIN SCREEN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;gap:20px;min-height:420px;text-align:center}
#login-screen .welcome{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;color:var(--txt1)}
#login-screen .desc{font-size:13.5px;color:var(--txt2);line-height:1.8;max-width:300px}
.google-btn{display:flex;align-items:center;gap:10px;background:var(--bg1);border:1.5px solid var(--border);border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;color:var(--txt1);cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;box-shadow:0 2px 8px rgba(61,43,31,.08)}
.google-btn:hover{border-color:var(--red);color:var(--red);box-shadow:0 4px 16px rgba(193,58,30,.15);transform:translateY(-1px)}
.google-btn svg{flex-shrink:0}
.login-note{font-size:11px;color:var(--txt3);line-height:1.6}

/* USER BAR */
#user-bar{display:none;background:var(--bg2);padding:10px 22px;border-bottom:1px solid var(--border);align-items:center;gap:10px}
#user-bar.show{display:flex}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--red-faint2);border:1.5px solid rgba(193,58,30,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--red);overflow:hidden;flex-shrink:0}
.user-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.user-name{font-size:12.5px;font-weight:700;color:var(--txt1);flex:1}
.user-email{font-size:11px;color:var(--txt3)}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--txt3);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* HEADER */
.header{background:var(--bg2);padding:14px 22px 12px;border-bottom:1px solid var(--border)}
.h-date{font-size:13px;font-weight:700;color:var(--txt1)}
.badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;background:var(--red-faint2);border:1px solid rgba(193,58,30,.25);border-radius:20px;padding:3px 10px;font-size:10.5px;font-weight:700;color:var(--red)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red)}

/* TABS */
.tabs{display:flex;background:var(--bg1);border-bottom:2px solid var(--border)}
.tab{flex:1;padding:12px 0;font-size:12.5px;font-weight:700;text-align:center;cursor:pointer;color:var(--txt3);border:none;background:transparent;transition:all .2s;font-family:'Noto Sans TC',sans-serif}
.tab.active{color:var(--red);border-bottom:2.5px solid var(--red);background:var(--red-faint)}
.tab:hover:not(.active){color:var(--txt2);background:var(--bg3)}

/* PANELS */
.panel{display:none;flex:1;flex-direction:column;padding:18px;min-height:480px}
.panel.active{display:flex}
#main-content{display:none}
#main-content.show{display:block}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-size:16px;font-weight:700;color:var(--txt1);font-family:'Noto Serif TC',serif}
.cal-nav{background:var(--bg1);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:17px;color:var(--txt2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav:hover{background:var(--red);color:#fff;border-color:var(--red)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:14px}
.dl{text-align:center;font-size:10px;font-weight:700;color:var(--txt3);padding:4px 0}
.cd{text-align:center;padding:5px 2px;font-size:12.5px;border-radius:8px;cursor:pointer;color:var(--txt2);transition:background .15s;min-height:32px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.cd:hover{background:var(--bg3)}
.cd.today{background:var(--red);color:#fff;font-weight:800}
.cd.today:hover{background:var(--red-dark)}
.cd.om{color:var(--txt3)}
.cd.sel:not(.today){outline:2px solid var(--red);outline-offset:-2px}
.cd .dots{display:flex;gap:2px;justify-content:center}
.cd .ev-dot{width:4px;height:4px;border-radius:50%;background:var(--red)}
.cd.today .ev-dot{background:rgba(255,255,255,.8)}

/* EVENT SECTION */
.ev-section{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ev-day-title{font-size:11.5px;font-weight:700;color:var(--txt3);margin-bottom:10px;letter-spacing:.5px}
.ev-scroll{flex:1;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:7px}
.ev-card{background:var(--bg1);border-radius:12px;padding:14px;border:1px solid var(--border)}
.ev-card-title{font-size:10.5px;font-weight:700;color:var(--txt3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.8px}
.field{margin-bottom:9px}
.field label{font-size:11px;font-weight:700;color:var(--txt2);display:block;margin-bottom:4px}
.field input,.field select{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:13px;background:var(--bg0);color:var(--txt1);font-family:'Noto Sans TC',sans-serif;outline:none;transition:border .2s}
.field input:focus,.field select:focus{border-color:var(--red)}
.field input::placeholder{color:var(--txt3)}
.field-row{display:flex;gap:8px}
.field-row .field{flex:1}

/* ATTENDEES */
.attendee-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.attendee-chip{display:flex;align-items:center;gap:5px;background:var(--red-faint2);border:1px solid rgba(193,58,30,.3);color:var(--red);border-radius:20px;padding:3px 10px 3px 8px;font-size:12px;font-weight:600}
.chip-del{background:none;border:none;cursor:pointer;color:var(--red);font-size:15px;line-height:1;padding:0;opacity:.7}
.chip-del:hover{opacity:1}
.add-attendee{display:flex;gap:6px}
.add-attendee input{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:12.5px;background:var(--bg0);color:var(--txt1);font-family:'Noto Sans TC',sans-serif;outline:none}
.add-attendee input:focus{border-color:var(--red)}
.add-attendee input::placeholder{color:var(--txt3)}
.add-attendee button{background:var(--red-faint2);color:var(--red);border:1px solid rgba(193,58,30,.3);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.add-attendee button:hover{background:var(--red);color:#fff}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0}
.toggle-row span{font-size:12.5px;font-weight:600;color:var(--txt1)}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:.25s}
.slider::before{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.slider{background:var(--red)}
.toggle input:checked+.slider::before{transform:translateX(16px)}

/* BUTTONS */
.btn-row{display:flex;gap:8px;margin-top:4px}
.btn{flex:1;border:none;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{transform:scale(1.02)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn.primary{background:var(--red);color:#fff}
.btn.primary:hover{background:var(--red-dark)}
.btn.secondary{background:var(--bg3);color:var(--txt2);border:1px solid var(--border)}
.btn.secondary:hover{color:var(--txt1)}

/* EVENT ITEMS */
.ev-item{background:var(--bg1);border-radius:10px;padding:11px 13px;display:flex;align-items:flex-start;gap:10px;border-left:3px solid var(--red);animation:pop .2s ease;box-shadow:0 1px 4px rgba(61,43,31,.06)}
.ev-item.multi-ev{border-color:var(--txt2)}
.ev-body{flex:1;min-width:0}
.ev-name{font-size:13px;font-weight:700;color:var(--txt1);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.ev-time{font-size:11px;color:var(--txt3)}
.ev-badge{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:700;background:var(--red-faint2);color:var(--red);border:1px solid rgba(193,58,30,.25)}
.ev-empty{color:var(--txt3);text-align:center;padding:24px 0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;font-size:13px}

/* MULTI SCHEDULE */
.section-label{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.find-card{background:var(--bg1);border-radius:12px;padding:14px;border:1px solid var(--border);margin-bottom:12px}
.duration-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.dur-btn{border:1px solid var(--border);background:var(--bg0);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;color:var(--txt2);transition:all .2s;font-family:'Noto Sans TC',sans-serif}
.dur-btn.active,.dur-btn:hover{background:var(--red);border-color:var(--red);color:#fff}
.date-range{display:flex;gap:8px;margin-bottom:10px}
.date-range input{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;background:var(--bg0);color:var(--txt1);font-family:'Noto Sans TC',sans-serif;outline:none}
.date-range input:focus{border-color:var(--red)}
.slot{background:var(--bg1);border-radius:10px;padding:11px 13px;border-left:3px solid var(--red-light);animation:pop .2s ease;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;margin-bottom:7px;box-shadow:0 1px 4px rgba(61,43,31,.06)}
.slot:hover{background:var(--bg3);transform:translateX(2px)}
.slot-info{flex:1}
.slot-date{font-size:12px;font-weight:700;color:var(--txt1)}
.slot-time{font-size:12px;color:var(--red);font-weight:600}
.slot-avail{font-size:11px;color:var(--txt3);margin-top:1px}
.slot-book{background:var(--red);color:#fff;border:none;border-radius:8px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.slot-book:hover{background:var(--red-dark)}

/* NOTES */
.add-row{display:flex;gap:8px;margin-bottom:14px}
.add-row input{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px 13px;font-size:13.5px;background:var(--bg1);color:var(--txt1);font-family:'Noto Sans TC',sans-serif;outline:none;transition:border .2s}
.add-row input:focus{border-color:var(--red)}
.add-row input::placeholder{color:var(--txt3)}
.add-row select{border:1px solid var(--border);border-radius:10px;padding:10px 9px;font-size:12px;background:var(--bg1);color:var(--txt1);font-family:'Noto Sans TC',sans-serif;outline:none}
.add-row .add-btn{background:var(--red);color:#fff;border:none;border-radius:10px;width:42px;font-size:20px;cursor:pointer;transition:all .15s;flex-shrink:0;font-weight:800}
.add-row .add-btn:hover{background:var(--red-dark);transform:scale(1.08)}
.note-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.note-item{background:var(--bg1);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;animation:pop .2s ease;border-left:3px solid var(--border);box-shadow:0 1px 4px rgba(61,43,31,.06)}
.note-item.work{border-color:var(--red)}
.note-item.personal{border-color:var(--red-light)}
.note-item.idea{border-color:var(--txt2)}
.note-item.done{opacity:.45}
.note-item.done .note-text{text-decoration:line-through}
.note-check{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;color:#fff}
.note-check.checked{background:var(--red);border-color:var(--red)}
.note-text{flex:1;font-size:13.5px;color:var(--txt1);line-height:1.5}
.note-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;background:var(--red-faint2);color:var(--red);border:1px solid rgba(193,58,30,.25)}
.note-del{background:none;border:none;font-size:17px;color:var(--txt3);cursor:pointer}
.note-del:hover{color:var(--red)}
.empty{color:var(--txt3);text-align:center;margin-top:40px;font-size:14px;line-height:2.4}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--txt1);color:#fff;padding:11px 22px;border-radius:14px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--red-dark)}
.toast.error{background:#8B2510}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
.footer{padding:10px 16px;text-align:center;font-size:10.5px;color:var(--txt3);border-top:1px solid var(--border);background:var(--bg2)}

@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.ev-scroll::-webkit-scrollbar,.note-list::-webkit-scrollbar{width:4px}
.ev-scroll::-webkit-scrollbar-thumb,.note-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>

<script>
// ═══════════════════════════════════════════
// 🔧 設定區：部署前請填入你的 CLIENT_ID
// ═══════════════════════════════════════════
const GOOGLE_CLIENT_ID = '184054840538-luqs4nl68tsbv79k4u1r0hjobreht436.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar';

// ═══════════════════════════════════════════
// 全域狀態
// ═══════════════════════════════════════════
let accessToken = null;
let currentUser = null;
let notes = [], gcalEventsMap = {};
let calYear, calMonth, selDate;
let attendees = [], findAttendees = [], findDuration = 60;

const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAYS = ['日','一','二','三','四','五','六'];
const TAGS = {work:'工作',personal:'個人',idea:'靈感'};

try { notes = JSON.parse(localStorage.getItem('lj_notes') || '[]'); } catch(e) {}
function saveNotes() { try { localStorage.setItem('lj_notes', JSON.stringify(notes)); } catch(e) {} }
function fmtDate(d) { return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate(); }
function pad(n) { return String(n).padStart(2,'0'); }
function escHtml(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

// ═══════════════════════════════════════════
// Google OAuth
// ═══════════════════════════════════════════
function handleGoogleLogin() {
  if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.includes('YOUR_GOOGLE')) {
    showToast('⚠️ 請先在程式碼中填入 Google Client ID', 'error', 5000);
    return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES + ' https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
    callback: async (tokenResponse) => {
      if (tokenResponse.error) {
        showToast('❌ 登入失敗：' + tokenResponse.error, 'error');
        return;
      }
      accessToken = tokenResponse.access_token;
      await loadUserInfo();
      showMainApp();
    },
  });
  client.requestAccessToken();
}

async function loadUserInfo() {
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    currentUser = await res.json();
  } catch(e) {
    currentUser = { name: '使用者', email: '' };
  }
}

function showMainApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('user-bar').classList.add('show');
  document.getElementById('main-content').classList.add('show');
  document.getElementById('auth-status').textContent = '已連接';

  const name = currentUser?.name || '使用者';
  const email = currentUser?.email || '';
  document.getElementById('user-name-display').textContent = name;
  document.getElementById('user-email-display').textContent = email;

  const initial = name.charAt(0).toUpperCase();
  if (currentUser?.picture) {
    document.getElementById('user-avatar').innerHTML = `<img src="${currentUser.picture}" alt="${name}"/>`;
  } else {
    document.getElementById('avatar-initial').textContent = initial;
  }

  init();
  showToast('✅ 已登入：' + name, 'success');
}

function handleLogout() {
  if (accessToken) {
    google.accounts.oauth2.revoke(accessToken, () => {});
  }
  accessToken = null;
  currentUser = null;
  gcalEventsMap = {};
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('user-bar').classList.remove('show');
  document.getElementById('main-content').classList.remove('show');
  document.getElementById('auth-status').textContent = '尚未登入';
  showToast('已登出');
}

// ═══════════════════════════════════════════
// Google Calendar API（直接呼叫，不透過 MCP）
// ═══════════════════════════════════════════
async function gcalFetch(path, method = 'GET', body = null) {
  if (!accessToken) throw new Error('尚未登入');
  const opts = {
    method,
    headers: {
      Authorization: 'Bearer ' + accessToken,
      'Content-Type': 'application/json',
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('https://www.googleapis.com/calendar/v3' + path, opts);
  if (res.status === 401) {
    handleLogout();
    showToast('登入已過期，請重新登入', 'error');
    throw new Error('Unauthorized');
  }
  return res.json();
}

async function loadGcalEvents() {
  if (!accessToken) return;
  const y = calYear, m = calMonth;
  const tMin = `${y}-${pad(m+1)}-01T00:00:00+08:00`;
  const lastDay = new Date(y, m+1, 0).getDate();
  const tMax = `${y}-${pad(m+1)}-${lastDay}T23:59:59+08:00`;
  try {
    const data = await gcalFetch(`/calendars/primary/events?timeMin=${encodeURIComponent(tMin)}&timeMax=${encodeURIComponent(tMax)}&singleEvents=true&orderBy=startTime&timeZone=Asia%2FTaipei`);
    gcalEventsMap = {};
    (data.items || []).forEach(ev => {
      const startStr = ev.start?.dateTime || ev.start?.date || '';
      if (!startStr) return;
      const d = new Date(startStr);
      const key = d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
      if (!gcalEventsMap[key]) gcalEventsMap[key] = [];
      const time = ev.start?.dateTime ? (d.getHours() + ':' + pad(d.getMinutes())) : '';
      gcalEventsMap[key].push({
        title: ev.summary || '行程',
        time,
        hasAttendees: (ev.attendees || []).length > 1,
        attendeeCount: (ev.attendees || []).length,
        hasMeet: !!(ev.conferenceData),
        meetLink: ev.conferenceData?.entryPoints?.[0]?.uri || ''
      });
    });
    renderCal();
    renderEvents();
  } catch(e) { if (e.message !== 'Unauthorized') console.warn('gcal err', e); }
}

async function addGcalEvent() {
  const name = document.getElementById('evName').value.trim();
  if (!name) { showToast('請先輸入行程名稱'); return; }
  if (!accessToken) { showToast('請先登入', 'error'); return; }

  const t1 = document.getElementById('evTime').value || '09:00';
  const t2 = document.getElementById('evEnd').value || '10:00';
  const loc = document.getElementById('evLoc').value.trim();
  const useMeet = document.getElementById('meetToggle').checked;
  const useReminder = document.getElementById('reminderToggle').checked;
  const parts = selDate.split('-');
  const y = parseInt(parts[0]), mo = parseInt(parts[1])-1, d = parseInt(parts[2]);
  const [sh,sm] = t1.split(':').map(Number);
  const [eh,em] = t2.split(':').map(Number);

  const startDT = `${y}-${pad(mo+1)}-${pad(d)}T${pad(sh)}:${pad(sm)}:00+08:00`;
  const endDT   = `${y}-${pad(mo+1)}-${pad(d)}T${pad(eh)}:${pad(em)}:00+08:00`;

  const btn = document.getElementById('addEvBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 新增中...';

  const body = {
    summary: name,
    start: { dateTime: startDT, timeZone: 'Asia/Taipei' },
    end:   { dateTime: endDT,   timeZone: 'Asia/Taipei' },
  };
  if (loc) body.location = loc;
  if (attendees.length) body.attendees = attendees.map(e => ({ email: e }));
  if (useMeet) body.conferenceData = { createRequest: { conferenceSolutionKey: { type: 'hangoutsMeet' }, requestId: 'lj-' + Date.now() }};
  if (useReminder) body.reminders = { useDefault: false, overrides: [{ method: 'popup', minutes: 15 }]};

  try {
    const conferenceVersion = useMeet ? '?conferenceDataVersion=1' : '';
    const result = await gcalFetch('/calendars/primary/events' + conferenceVersion, 'POST', body);
    if (result.id) {
      if (!gcalEventsMap[selDate]) gcalEventsMap[selDate] = [];
      gcalEventsMap[selDate].push({ title: name, time: t1, hasAttendees: attendees.length > 0, attendeeCount: attendees.length+1, hasMeet: useMeet });
      renderCal(); renderEvents(); clearForm();
      showToast(attendees.length ? '✅ 已新增！邀請通知已寄出 📧' : '✅ 已加入 Google 行事曆', 'success');
    } else {
      showToast('⚠️ 新增失敗，請稍後再試', 'error');
    }
  } catch(e) {
    if (e.message !== 'Unauthorized') showToast('❌ 新增失敗：' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg> 加入 Google 行事曆';
  }
}

async function findSlots() {
  if (findAttendees.length < 1) { showToast('請至少加入一位參與者 email'); return; }
  const fromStr = document.getElementById('findFrom').value;
  const toStr   = document.getElementById('findTo').value;
  if (!fromStr || !toStr) { showToast('請選擇搜尋日期範圍'); return; }
  if (!accessToken) { showToast('請先登入', 'error'); return; }

  const btn = document.getElementById('findBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 搜尋中...';
  document.getElementById('slotResult').innerHTML = '';

  const items = [{ id: 'primary' }, ...findAttendees.map(e => ({ id: e }))];
  const body = {
    timeMin: fromStr + 'T09:00:00+08:00',
    timeMax: toStr   + 'T18:00:00+08:00',
    timeZone: 'Asia/Taipei',
    items,
  };

  try {
    const data = await gcalFetch('/freeBusy', 'POST', body);
    const busyMap = data.calendars || {};

    // 找出所有人都空閒的時段
    const slots = [];
    const start = new Date(fromStr + 'T09:00:00+08:00');
    const end   = new Date(toStr   + 'T18:00:00+08:00');
    const dur   = findDuration * 60 * 1000;

    // 收集所有 busy 區間
    const allBusy = [];
    Object.values(busyMap).forEach(cal => {
      (cal.busy || []).forEach(b => allBusy.push({ s: new Date(b.start), e: new Date(b.end) }));
    });

    let t = new Date(start);
    while (slots.length < 5 && t < end) {
      // 跳過週末
      if (t.getDay() === 0 || t.getDay() === 6) { t = new Date(t.getTime() + 86400000); t.setHours(9,0,0,0); continue; }
      const slotEnd = new Date(t.getTime() + dur);
      if (slotEnd.getHours() > 18) { t = new Date(t); t.setDate(t.getDate()+1); t.setHours(9,0,0,0); continue; }
      const conflict = allBusy.some(b => t < b.e && slotEnd > b.s);
      if (!conflict) {
        const weekDays = ['日','一','二','三','四','五','六'];
        slots.push({
          date: `${t.getFullYear()}年${t.getMonth()+1}月${t.getDate()}日（週${weekDays[t.getDay()]}）`,
          start: pad(t.getHours()) + ':' + pad(t.getMinutes()),
          end:   pad(slotEnd.getHours()) + ':' + pad(slotEnd.getMinutes()),
          raw: new Date(t),
        });
        t = new Date(slotEnd);
      } else {
        t = new Date(t.getTime() + 30 * 60 * 1000);
      }
    }

    if (!slots.length) {
      document.getElementById('slotResult').innerHTML = `<div class="ev-empty" style="margin-top:0;padding:20px 0"><span style="font-size:28px">😕</span><span>找不到共同空閒時間，請調整搜尋範圍</span></div>`;
    } else {
      window._foundSlots = slots;
      document.getElementById('slotResult').innerHTML = `
        <div class="section-label" style="margin-bottom:10px">✅ 找到 ${slots.length} 個可用時段</div>
        ${slots.map((s,i) => `
          <div class="slot" onclick="bookSlot(${i})">
            <div class="slot-info">
              <div class="slot-date">${escHtml(s.date)}</div>
              <div class="slot-time">⏰ ${s.start} – ${s.end}</div>
              <div class="slot-avail">👥 ${findAttendees.length+1} 人皆可出席</div>
            </div>
            <button class="slot-book">選這個</button>
          </div>`).join('')}`;
    }
  } catch(e) {
    if (e.message !== 'Unauthorized') document.getElementById('slotResult').innerHTML = '<div class="ev-empty" style="margin-top:0">❌ 搜尋失敗，請稍後再試</div>';
  } finally {
    btn.disabled = false; btn.innerHTML = '🔎 找出共同空閒時段';
  }
}

// ═══════════════════════════════════════════
// UI helpers
// ═══════════════════════════════════════════
function showToast(msg, type='', ms=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type||'');
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), ms);
}

function init() {
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth(); selDate = fmtDate(now);
  document.getElementById('headerDate').textContent = now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 星期'+DAYS[now.getDay()];
  const d1 = now.toISOString().split('T')[0];
  const d2 = new Date(now.getTime()+7*86400000).toISOString().split('T')[0];
  document.getElementById('findFrom').value = d1;
  document.getElementById('findTo').value   = d2;
  renderNotes(); renderCal(); renderEvents(); loadGcalEvents();
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['cal','multi','notes'][i] === t));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  if (t === 'cal') loadGcalEvents();
}

function changeMonth(d) {
  calMonth += d;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCal(); loadGcalEvents();
}

function renderCal() {
  document.getElementById('calTitle').textContent = calYear + '年' + MONTHS[calMonth];
  const g = document.getElementById('calGrid');
  let h = DAYS.map(d => `<div class="dl">${d}</div>`).join('');
  const first   = new Date(calYear, calMonth, 1).getDay();
  const dim     = new Date(calYear, calMonth+1, 0).getDate();
  const pd      = new Date(calYear, calMonth, 0).getDate();
  const today   = new Date();
  const mkDots  = ds => { const evs = gcalEventsMap[ds]||[]; if (!evs.length) return ''; return `<div class="dots">${evs.slice(0,3).map(() => `<span class="ev-dot"></span>`).join('')}</div>`; };
  for (let i=0; i<first; i++) { const d=pd-first+1+i, ds=calYear+'-'+calMonth+'-'+d; h+=`<div class="cd om" onclick="selDay('${ds}')">${d}${mkDots(ds)}</div>`; }
  for (let d=1; d<=dim; d++) {
    const ds = calYear+'-'+(calMonth+1)+'-'+d;
    const isT = calYear===today.getFullYear() && calMonth===today.getMonth() && d===today.getDate();
    const isSel = ds===selDate;
    h += `<div class="cd${isT?' today':''}${isSel&&!isT?' sel':''}" onclick="selDay('${ds}')">${d}${mkDots(ds)}</div>`;
  }
  g.innerHTML = h;
}

function selDay(ds) { selDate = ds; renderCal(); renderEvents(); }

function renderEvents() {
  const p = selDate.split('-');
  document.getElementById('evTitle').textContent = p[0]+'年'+p[1]+'月'+p[2]+'日 的行程';
  const evs = gcalEventsMap[selDate] || [];
  const el  = document.getElementById('evScroll');
  if (!evs.length) { el.innerHTML = '<div class="ev-empty"><span style="font-size:28px">🌿</span><span>這天還沒有行程</span></div>'; return; }
  el.innerHTML = evs.map(e => `
    <div class="ev-item${e.hasAttendees?' multi-ev':''}">
      <div class="ev-body">
        <div class="ev-name">${escHtml(e.title)}</div>
        <div class="ev-meta">
          ${e.time ? `<span class="ev-time">⏰ ${e.time}</span>` : ''}
          ${e.hasAttendees ? `<span style="font-size:11px;color:var(--txt3)">👥 ${e.attendeeCount} 人</span>` : ''}
          ${e.hasMeet ? `<span class="ev-badge">Meet</span>` : ''}
          <span class="ev-badge">${e.hasAttendees ? '多人' : '個人'}</span>
        </div>
      </div>
    </div>`).join('');
}

function addAttendee() {
  const inp = document.getElementById('attendeeInput');
  const email = inp.value.trim().toLowerCase();
  if (!email || !email.includes('@')) return;
  if (attendees.includes(email)) { showToast('已加入過這個 email'); return; }
  attendees.push(email); renderAttendees(); inp.value = '';
}
function removeAttendee(i) { attendees.splice(i,1); renderAttendees(); }
function renderAttendees() {
  document.getElementById('attendeeList').innerHTML = attendees.map((e,i) =>
    `<div class="attendee-chip">👤 ${escHtml(e)}<button class="chip-del" onclick="removeAttendee(${i})">×</button></div>`).join('');
}
function clearForm() { document.getElementById('evName').value=''; document.getElementById('evLoc').value=''; attendees=[]; renderAttendees(); }

function addFindAttendee() {
  const inp = document.getElementById('findAttendeeInput');
  const email = inp.value.trim().toLowerCase();
  if (!email || !email.includes('@')) return;
  if (findAttendees.includes(email)) return;
  findAttendees.push(email); renderFindAttendees(); inp.value = '';
}
function removeFindAttendee(i) { findAttendees.splice(i,1); renderFindAttendees(); }
function renderFindAttendees() {
  document.getElementById('findAttendeeList').innerHTML = findAttendees.map((e,i) =>
    `<div class="attendee-chip">👤 ${escHtml(e)}<button class="chip-del" onclick="removeFindAttendee(${i})">×</button></div>`).join('');
}
function setDur(d, btn) {
  findDuration = d;
  document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function bookSlot(i) {
  const slot = (window._foundSlots||[])[i]; if (!slot) return;
  switchTab('cal');
  document.getElementById('evTime').value = slot.start;
  document.getElementById('evEnd').value  = slot.end;
  // Set selected date
  selDate = slot.raw.getFullYear()+'-'+(slot.raw.getMonth()+1)+'-'+slot.raw.getDate();
  if (slot.raw.getMonth() !== calMonth || slot.raw.getFullYear() !== calYear) {
    calYear = slot.raw.getFullYear(); calMonth = slot.raw.getMonth(); renderCal();
  } else { renderCal(); }
  renderEvents();
  findAttendees.forEach(e => { if (!attendees.includes(e)) attendees.push(e); });
  renderAttendees();
  document.getElementById('evName').focus();
  showToast('📝 請輸入行程名稱後新增！', '', 3000);
}

function addNote() {
  const inp = document.getElementById('noteInput');
  const txt = inp.value.trim(); if (!txt) return;
  notes.unshift({id:Date.now(),text:txt,tag:document.getElementById('noteTag').value,done:false});
  saveNotes(); renderNotes(); inp.value=''; inp.focus();
}
function toggleNote(id) { const n=notes.find(x=>x.id===id); if(n) n.done=!n.done; saveNotes(); renderNotes(); }
function delNote(id) { notes=notes.filter(x=>x.id!==id); saveNotes(); renderNotes(); }
function renderNotes() {
  const el = document.getElementById('noteList');
  if (!notes.length) { el.innerHTML='<div class="empty">還沒有記事 🌿<br>把想法記下來吧！</div>'; return; }
  el.innerHTML = notes.map(n => `
    <div class="note-item ${n.tag}${n.done?' done':''}">
      <div class="note-check${n.done?' checked':''}" onclick="toggleNote(${n.id})">${n.done?'✓':''}</div>
      <span class="note-text">${escHtml(n.text)}</span>
      <span class="note-tag">${TAGS[n.tag]||n.tag}</span>
      <button class="note-del" onclick="delNote(${n.id})">×</button>
    </div>`).join('');
}
</script>
</body>
</html>
